name: 🗑 Clean selected folder

on:
  workflow_dispatch:
    inputs:
      target_folder:
        description: '📂 Folder path to clean (example: downloads, build/output)'
        required: true
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside the selected folder.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Clean and recreate selected folder
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TARGET_FOLDER="${{ inputs.target_folder }}"

          echo "AVASAM (https://avasam.ir)"
          echo "Requested folder to clean: $TARGET_FOLDER"
          echo ""

          # ---- SAFETY CHECKS ----
          if [ -z "$TARGET_FOLDER" ] || [ "$TARGET_FOLDER" = "/" ] || [ "$TARGET_FOLDER" = "." ]; then
            echo "❌ Refusing to delete unsafe path: '$TARGET_FOLDER'"
            exit 1
          fi

          if [ -d "$TARGET_FOLDER" ]; then
            echo "Removing folder contents..."
            git rm -rf "$TARGET_FOLDER" 2>/dev/null || true
            rm -rf "$TARGET_FOLDER" 2>/dev/null || true
          else
            echo "Folder doesn't exist, will create it."
          fi

          mkdir -p "$TARGET_FOLDER"
          printf '## empty\nCleaned via GitHub Actions\n' > "$TARGET_FOLDER/README.md"

          git add -f "$TARGET_FOLDER/README.md"

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[AVASAM] Clean $TARGET_FOLDER folder [skip ci]"

          echo "Pushing changes..."

          RETRY=0
          MAX_RETRIES=5
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git rebase origin/"$BRANCH" 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git reset --hard HEAD~1 2>/dev/null || true
              git pull --rebase origin "$BRANCH" 2>/dev/null || true

              rm -rf "$TARGET_FOLDER" 2>/dev/null || true
              mkdir -p "$TARGET_FOLDER"
              printf '## empty\nCleaned via GitHub Actions\n' > "$TARGET_FOLDER/README.md"
              git add -f "$TARGET_FOLDER/README.md"
              git commit -m "[AVASAM] Clean $TARGET_FOLDER folder [skip ci]" 2>/dev/null || true
            }

            if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
              echo ""
              echo "=========================================="
              echo "✅ Folder '$TARGET_FOLDER' cleared successfully!"
              echo "AVASAM (https://avasam.ir)"
              echo "=========================================="
              exit 0
            else
              echo "Push failed, retry $RETRY/$MAX_RETRIES..."
              sleep $((2 + RANDOM % 5))
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1
